{% extends "base.html" %}

{% block content %}
<style>
    .weather-body {
        background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%);
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 20px;
        margin-top: 20px;
        color: white;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .weather-card {
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(15px);
        padding: 40px;
        border-radius: 30px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        text-align: center;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    }
    .temp { font-size: 5rem; font-weight: bold; margin: 10px 0; }
    .city { font-size: 1.8rem; margin-bottom: 5px; }
    .desc { font-size: 1.2rem; opacity: 0.9; text-transform: capitalize; }
    .details {
        display: grid;
        grid-template-columns: 1fr 1fr;
        margin-top: 30px;
        border-top: 1px solid rgba(255,255,255,0.2);
        padding-top: 20px;
    }
    .detail-item i { font-size: 1.5rem; margin-bottom: 5px; display: block; }
</style>

<div class="container">
    <div class="weather-body">
        {% if weather %}
        <div class="weather-card">
            <div class="city">{{ weather.city }}</div>
            <div class="desc">{{ weather.desc }}</div>
            
            <img src="http://openweathermap.org/img/wn/{{ weather.icon }}@4x.png" alt="weather icon">
            
            <div class="temp">{{ weather.temp }}°C</div>
            
            <div class="details">
                <div class="detail-item">
                    <i class="fas fa-tint"></i>
                    <span>الرطوبة</span>
                    <div>{{ weather.humidity }}%</div>
                </div>
                <div class="detail-item">
                    <i class="fas fa-wind"></i>
                    <span>الرياح</span>
                    <div>{{ weather.wind }} كم/س</div>
                </div>
            </div>
        </div>
        {% else %}
        <div class="weather-card">
            <p>عذراً، تعذر جلب بيانات الطقس حالياً.</p>
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
