<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="منصة المساعدات والوظائف والتعليم - أخبار عاجلة وتحديثات يومية">
    <title>{% block title %}منصة المتقدمون{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <h1>منصة <span>المساعدات</span></h1>
      <nav>
    <ul>
        <li><a href="{{ url_for('home') }}">الرئيسية</a></li>
        <li><a href="{{ url_for('register') }}">تقديم طلب</a></li>
        
        <li class="dropdown">
            <a href="#" class="dropbtn">الأقسام <i class="fas fa-caret-down"></i></a>
            <div class="dropdown-menu">
                <a href="{{ url_for('education') }}">التعليم</a>
                <a href="{{ url_for('jobs') }}">الوظائف</a>
                <a href="{{ url_for('article') }}">الأخبار</a>
                <a href="{{ url_for('weather') }}">الطقس</a>
                <a href="{{ url_for('economy') }}">الاقتصاد</a>
            </div>
        </li>
    </ul>
</nav>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer style="text-align: center; padding: 2rem; background: var(--primary); color: white; margin-top: 50px;">
        <p>جميع الحقوق محفوظة © 2026 | منصة المساعدات الإنسانية</p>
        <div style="margin-top: 10px;">
            <a href="{{ url_for('privacy') }}" style="color: #bdc3c7; text-decoration: none;">سياسة الخصوصية</a>
        </div>
    </footer>
</body>
</html>
