{% extends "base.html" %}

{% block title %}تسجيل الدخول - الإدارة{% endblock %}

{% block content %}
<div class="container" style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
    <div class="form-card" style="width: 100%; max-width: 400px;">
        <div style="text-align: center; margin-bottom: 20px;">
            <i class="fas fa-lock-open" style="font-size: 3rem; color: var(--secondary);"></i>
            <h2 style="margin-top: 10px;">دخول المسؤول</h2>
        </div>
        
        <form action="{{ url_for('login') }}" method="POST">
            <div class="form-group">
                <label>كلمة المرور السرية:</label>
                <input type="password" name="password" placeholder="أدخل كلمة المرور هنا" required 
                       style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; margin-top: 8px;">
            </div>
            
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <p style="color: #e74c3c; font-size: 0.9rem; margin-top: 10px; text-align: center;">{{ message }}</p>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <button type="submit" class="submit-btn" style="margin-top: 20px; width: 100%;">دخول</button>
        </form>
    </div>
</div>
{% endblock %}
